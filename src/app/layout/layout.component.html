<div class="flex flex-col h-screen bg-epic-900 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-epic-800 via-epic-900 to-epic-900 text-gray-200 overflow-hidden font-sans">
  <!-- Main Content Area -->
  <main class="flex-1 overflow-y-auto pb-20 relative">
    <div class="container mx-auto max-w-md h-full relative p-4" [@routeAnimations]="outlet.isActivated ? outlet.activatedRoute : ''">
      <router-outlet #outlet="outlet"></router-outlet>
    </div>
  </main>

  <!-- Bottom Navigation Bar -->
  <nav class="fixed bottom-0 w-full h-16 bg-epic-900/95 backdrop-blur-md border-t border-epic-700/50 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-50 overflow-x-auto hide-scroll-bar">
    <div class="min-w-max h-full flex items-center justify-start px-2 gap-4 xs:gap-8 mx-auto w-full *:flex-shrink-0" style="width: max-content; margin: 0 auto; padding: 0 16px;">
      
      <a routerLink="/dashboard" routerLinkActive="text-epic-gold drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]" class="flex flex-col items-center justify-center h-full px-2 text-gray-500 hover:text-epic-gold_dim transition-all w-14">
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="text-[10px] font-medium leading-none">Home</span>
      </a>

      <a routerLink="/exercise" routerLinkActive="text-epic-gold drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]" class="flex flex-col items-center justify-center h-full px-2 text-gray-500 hover:text-epic-gold_dim transition-all w-14">
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        <span class="text-[10px] font-medium leading-none">Train</span>
      </a>

      <a routerLink="/diet" routerLinkActive="text-epic-gold drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]" class="flex flex-col items-center justify-center h-full px-2 text-gray-500 hover:text-epic-gold_dim transition-all w-14">
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.701 2.701 0 00-1.5-.454M9 6v2m3-2v2m3-2v2M9 3h.01M12 3h.01M15 3h.01M21 21v-7a2 2 0 00-2-2H5a2 2 0 00-2 2v7h18zm-3-9v-2a2 2 0 00-2-2H8a2 2 0 00-2 2v2h12z"></path></svg>
        <span class="text-[10px] font-medium leading-none">Diet</span>
      </a>

      <a routerLink="/weight" routerLinkActive="text-epic-gold drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]" class="flex flex-col items-center justify-center h-full px-2 text-gray-500 hover:text-epic-gold_dim transition-all w-14">
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
        <span class="text-[10px] font-medium leading-none">Weight</span>
      </a>

      <a routerLink="/settings" routerLinkActive="text-epic-gold drop-shadow-[0_0_8px_rgba(251,191,36,0.6)]" class="flex flex-col items-center justify-center h-full px-2 text-gray-500 hover:text-epic-gold_dim transition-all w-14">
        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        <span class="text-[10px] font-medium leading-none">Settings</span>
      </a>

    </div>
  </nav>

  <!-- Daily Check-In Overlay -->
  <div *ngIf="showDailyCheckIn" class="absolute inset-0 bg-epic-900/95 backdrop-blur-md z-[100] flex flex-col justify-center items-center p-6 animate-fade-in">
    <div class="w-full max-w-sm bg-epic-800 border border-epic-700 p-6 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.8)] text-center relative overflow-hidden">
      <!-- Decor -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-epic-gold/10 rounded-full blur-3xl"></div>
      
      <h2 class="text-2xl font-bold font-serif text-white mb-2 relative z-10">Daily Rite</h2>
      <p class="text-sm text-gray-400 mb-8 relative z-10">Forge today's starting state</p>

      <div class="space-y-6 text-left relative z-10">
        
        <!-- Pain Slider -->
        <div>
          <label class="flex justify-between text-xs font-semibold text-epic-gold mb-2 uppercase tracking-wider">
            <span>Physical Suffering</span>
            <span class="text-white text-sm">{{ checkInData.painLevel }}/10</span>
          </label>
          <input type="range" min="0" max="10" [(ngModel)]="checkInData.painLevel" class="w-full accent-epic-ruby h-2 bg-epic-900 rounded-lg appearance-none cursor-pointer">
          <div class="flex justify-between text-[10px] text-gray-500 mt-1">
            <span>None</span>
            <span>Unbearable</span>
          </div>
        </div>

        <!-- Energy Level -->
        <div>
          <label class="block text-xs font-semibold text-epic-gold mb-2 uppercase tracking-wider">Vitality (Energy)</label>
          <div class="flex justify-between gap-2">
            <button (click)="checkInData.energyLevel = i" *ngFor="let i of [1,2,3,4,5]" 
                    [class.bg-epic-gold]="checkInData.energyLevel === i" 
                    [class.text-epic-900]="checkInData.energyLevel === i"
                    [class.bg-epic-900]="checkInData.energyLevel !== i"
                    [class.text-gray-400]="checkInData.energyLevel !== i"
                    class="flex-1 py-3 rounded-xl border border-epic-700 font-bold transition-colors">
              {{ i }}
            </button>
          </div>
        </div>

        <!-- Mood Selector -->
        <div>
          <label class="block text-xs font-semibold text-epic-gold mb-2 uppercase tracking-wider">State of Mind</label>
          <div class="grid grid-cols-2 gap-2">
            <button (click)="checkInData.mood = m" *ngFor="let m of moods"
                    [class.border-epic-gold]="checkInData.mood === m"
                    [class.text-epic-gold]="checkInData.mood === m"
                    [class.bg-epic-gold/10]="checkInData.mood === m"
                    [class.border-epic-700]="checkInData.mood !== m"
                    [class.text-gray-400]="checkInData.mood !== m"
                    class="py-3 rounded-xl border capitalize font-semibold transition-colors">
              {{ m }}
            </button>
          </div>
        </div>

      </div>

      <button (click)="submitCheckIn()" class="w-full mt-8 py-4 bg-gradient-to-r from-epic-gold to-yellow-400 text-epic-900 rounded-xl font-bold font-serif text-lg shadow-[0_0_15px_rgba(251,191,36,0.3)] hover:scale-105 active:scale-95 transition-all relative z-10 cursor-pointer">
        Seal the Rite
      </button>
      
      <button (click)="showDailyCheckIn = false" class="mt-4 text-xs tracking-wider uppercase text-gray-500 hover:text-gray-300 font-medium relative z-10">
        Skip for now
      </button>

    </div>
  </div>

  <!-- Full-Screen Alarm Overlay -->
  <div *ngIf="showAlarm" class="fixed inset-0 bg-black z-[200] flex flex-col justify-center items-center p-6 animate-fade-in">
    <!-- Pulsing background glow -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
      <div class="w-80 h-80 bg-epic-gold/20 rounded-full blur-3xl animate-pulse"></div>
    </div>
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
      <div class="w-48 h-48 bg-epic-ruby/15 rounded-full blur-2xl animate-pulse" style="animation-delay: 0.5s"></div>
    </div>

    <div class="relative z-10 w-full max-w-sm text-center">
      <!-- Bell icon with pulse ring -->
      <div class="relative mx-auto w-24 h-24 mb-8">
        <div class="absolute inset-0 bg-epic-gold/20 rounded-full animate-ping"></div>
        <div class="relative w-24 h-24 bg-epic-900 border-2 border-epic-gold rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(251,191,36,0.3)]">
          <svg class="w-12 h-12 text-epic-gold animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
        </div>
      </div>

      <!-- Title -->
      <h2 class="text-3xl font-bold font-serif text-epic-gold mb-3">{{ alarmTitle }}</h2>
      <p class="text-lg text-gray-300 mb-12 leading-relaxed">{{ alarmBody }}</p>

      <!-- Action Buttons -->
      <div class="space-y-4">
        <button (click)="acceptAlarm()" class="w-full py-5 bg-gradient-to-r from-epic-gold to-yellow-400 text-epic-900 rounded-2xl font-bold font-serif text-xl shadow-[0_0_30px_rgba(251,191,36,0.4)] hover:scale-105 active:scale-95 transition-all">
          Accept
        </button>
        <button (click)="dismissAlarm()" class="w-full py-4 bg-epic-900 border border-gray-700 text-gray-400 rounded-2xl font-bold text-lg hover:bg-gray-800 hover:text-white active:scale-95 transition-all">
          Dismiss
        </button>
      </div>
    </div>
  </div>
</div>
