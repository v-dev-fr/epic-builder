<div class="animate-fade-in py-2 h-full flex flex-col relative">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-epic-gold to-yellow-200 font-serif">Epic Disciplines</h1>
      <p class="text-sm text-gray-400">Your legacy is built daily</p>
    </div>
    <button (click)="showAddHabit = true" class="w-10 h-10 rounded-full bg-epic-800 border border-epic-700 flex flex-col items-center justify-center text-epic-gold hover:bg-epic-gold hover:text-epic-900 transition-colors shadow-md">
      <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      <span class="text-[10px] font-bold mt-0.5">ADD</span>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto pb-24 space-y-4">
    
    <div *ngFor="let h of habitStats" class="bg-epic-800 p-4 rounded-2xl border border-epic-700 shadow-md shadow-black/40 mb-4 transition-all">
      <!-- Title and Checkbox -->
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <button (click)="toggleHabitToday(h.id)" 
                  class="w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-all peer group"
                  [ngClass]="h.completedToday ? 'bg-epic-gold border-epic-gold text-epic-900 shadow-[0_0_10px_rgba(251,191,36,0.5)]' : 'border-epic-700 hover:border-epic-gold/50'">
            <svg *ngIf="h.completedToday" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
          </button>
          <h2 class="text-lg font-bold text-gray-200 peer-hover:text-epic-gold transition-colors cursor-pointer" (click)="toggleHabitToday(h.id)">{{ h.name }}</h2>
        </div>
        <button (click)="openEditHabit(h)" class="p-2 text-gray-500 hover:text-epic-gold transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        </button>
      </div>

      <div class="text-xs font-semibold uppercase tracking-wider mt-1 mb-4" [class.text-epic-gold]="h.currentStreak > 0" [class.text-gray-500]="h.currentStreak === 0">
        Current Legend: {{ h.currentStreak }} Days
      </div>

      <!-- Mini Heatmap (Last 7 Days) -->
      <div class="mt-4 pt-4 border-t border-epic-700/50">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-semibold flex justify-between">
          <span>Last 7 Cycles</span>
          <span>Today</span>
        </div>
        <div class="flex gap-1 justify-between">
          <div *ngFor="let day of h.history" class="h-6 flex-1 rounded-sm border border-epic-900 transition-colors" [class.bg-epic-gold]="day" [class.bg-epic-700]="!day" [class.opacity-40]="!day"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Add/Edit Habit Modal -->
<div *ngIf="showAddHabit" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-epic-800 w-full max-w-sm rounded-3xl border border-epic-700 shadow-[0_0_50px_rgba(0,0,0,0.8)] overflow-hidden">
    <div class="p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold font-serif text-white">{{ editingHabitId ? 'Edit Discipline' : 'Forge New Discipline' }}</h2>
        <button *ngIf="editingHabitId" (click)="deleteHabit(editingHabitId); showAddHabit = false" class="p-2 text-gray-500 hover:text-epic-ruby hover:bg-epic-ruby/10 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Discipline Name</label>
          <input type="text" [(ngModel)]="newHabitName" placeholder="e.g. Read 10 Pages" class="w-full bg-epic-900 border border-epic-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-epic-gold focus:ring-1 focus:ring-epic-gold transition-colors">
        </div>
      </div>

      <div class="flex gap-3 mt-8">
        <button (click)="showAddHabit = false; newHabitName = ''; editingHabitId = null" class="flex-1 py-3 bg-epic-900 text-gray-300 rounded-xl font-medium border border-epic-700 hover:bg-epic-800 transition-colors">
          Cancel
        </button>
        <button (click)="saveHabit()" [disabled]="!newHabitName.trim()" class="flex-1 py-3 bg-gradient-to-r from-epic-gold to-yellow-400 text-epic-900 rounded-xl font-bold shadow-[0_4px_15px_rgba(251,191,36,0.2)] hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          {{ editingHabitId ? 'Enchant' : 'Forge' }}
        </button>
      </div>
    </div>
  </div>
</div>
