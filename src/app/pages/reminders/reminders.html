<div class="animate-fade-in py-2 h-full flex flex-col relative">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-epic-gold to-yellow-200 font-serif">Oaths & Decrees</h1>
      <p class="text-sm text-gray-400">Automated nudges to keep you aligned</p>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto pb-24 space-y-4">
    <div *ngIf="reminders.length === 0" class="flex flex-col items-center justify-center py-10 text-gray-500">
      <svg class="w-12 h-12 mb-3 opacity-20 text-epic-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p>No decrees written yet.</p>
    </div>

    <!-- Reminder Cards -->
    <div *ngFor="let rm of reminders" class="bg-epic-800 p-4 rounded-2xl border border-epic-700 shadow-md shadow-black/40 flex justify-between items-center group transition-colors" [class.opacity-60]="!rm.isActive" [class.border-epic-gold]="rm.isActive && rm.priority==='high'">
      <div class="flex-1">
        <h3 class="font-bold text-gray-100 text-lg flex items-center gap-2">
          {{ rm.title }}
          <span *ngIf="rm.priority==='high'" class="w-2 h-2 rounded-full bg-epic-ruby"></span>
        </h3>
        
        <div class="text-xs text-epic-gold mt-1 flex items-center gap-2 font-medium tracking-wide">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          {{ rm.time }} 
          <span class="text-gray-500 mx-1">•</span> 
          <span class="uppercase">{{ rm.frequency }}</span>
          <span *ngIf="rm.intervalMode" class="text-gray-400 capitalize bg-epic-900 border border-epic-700 px-1 rounded ml-1">Every {{rm.intervalMinutes}}m</span>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <!-- Toggle Switch -->
        <button (click)="toggleActive(rm)" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none" [class.bg-epic-gold]="rm.isActive" [class.bg-gray-700]="!rm.isActive">
          <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform" [class.translate-x-6]="rm.isActive" [class.translate-x-1]="!rm.isActive"></span>
        </button>
        <div class="flex gap-2">
          <!-- Edit Button -->
          <button (click)="editReminder(rm); $event.stopPropagation()" class="px-3 py-2 bg-blue-900/30 text-blue-400 rounded-lg hover:bg-blue-800/50 hover:text-blue-300 transition-colors" title="Edit Oath">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
          </button>
          
          <!-- Delete Button -->
          <button (click)="deleteReminder(rm.id); $event.stopPropagation()" class="px-3 py-2 bg-red-900/30 text-red-500 rounded-lg hover:bg-red-800/50 hover:text-red-400 transition-colors" title="Delete Oath">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Floating Add Button -->
  <button (click)="openAddModal()" class="absolute bottom-4 right-2 w-14 h-14 bg-epic-gold text-epic-900 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(251,191,36,0.5)] hover:scale-105 active:scale-95 transition-all z-40">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
  </button>

  <!-- Add Modal Overlay -->
  <div *ngIf="showAddModal" class="absolute inset-x-0 bottom-0 top-16 bg-epic-900/95 backdrop-blur-md z-50 flex flex-col p-4 animate-fade-in border-t border-epic-gold/30 shadow-[0_-10px_40px_rgba(0,0,0,0.8)] rounded-t-3xl">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold font-serif text-white">Draft New Decree</h2>
      <button (click)="showAddModal = false" class="text-gray-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto space-y-4 pb-4 px-1">
      <div>
        <label class="block text-xs font-semibold text-epic-gold mb-1 uppercase tracking-wider">Title</label>
        <input type="text" [(ngModel)]="newReminder.title" placeholder="e.g. Drink Water" class="w-full bg-epic-800 border border-epic-700 rounded-xl px-3 py-3 text-sm focus:ring-1 focus:ring-epic-gold outline-none text-white">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-epic-gold mb-1 uppercase tracking-wider">Time</label>
          <input type="time" [(ngModel)]="newReminder.time" class="w-full bg-epic-800 border border-epic-700 rounded-xl px-3 py-3 text-sm focus:ring-1 focus:ring-epic-gold outline-none text-white">
        </div>
        <div>
          <label class="block text-xs font-semibold text-epic-gold mb-1 uppercase tracking-wider">Frequency</label>
          <select [(ngModel)]="newReminder.frequency" class="w-full bg-epic-800 border border-epic-700 rounded-xl px-3 py-3 text-sm focus:ring-1 focus:ring-epic-gold outline-none text-white">
            <option value="daily">Daily</option>
            <option value="weekdays">Weekdays</option>
            <option value="once">Once</option>
          </select>
        </div>
      </div>

      <div class="flex items-center justify-between p-3 bg-epic-800 border border-epic-700 rounded-xl">
        <div class="text-sm font-medium text-gray-200">Repeats within day? (Intervals)</div>
        <button (click)="newReminder.intervalMode = !newReminder.intervalMode" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors" [class.bg-epic-gold]="newReminder.intervalMode" [class.bg-gray-700]="!newReminder.intervalMode">
          <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform" [class.translate-x-6]="newReminder.intervalMode" [class.translate-x-1]="!newReminder.intervalMode"></span>
        </button>
      </div>

      <div *ngIf="newReminder.intervalMode" class="animate-fade-in pl-4 border-l-2 border-epic-gold/50 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Interval (Minutes)</label>
          <input type="number" [(ngModel)]="newReminder.intervalMinutes" placeholder="e.g. 60" class="w-full bg-epic-800 border border-epic-700 rounded-xl px-3 py-3 text-sm focus:ring-1 focus:ring-epic-gold outline-none text-white">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Start Time</label>
            <input type="time" [(ngModel)]="newReminder.startWindow" class="w-full bg-epic-800 border border-epic-700 rounded-xl px-3 py-3 text-sm focus:ring-1 focus:ring-epic-gold outline-none text-white">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">End Time</label>
            <input type="time" [(ngModel)]="newReminder.endWindow" class="w-full bg-epic-800 border border-epic-700 rounded-xl px-3 py-3 text-sm focus:ring-1 focus:ring-epic-gold outline-none text-white">
          </div>
        </div>
      </div>
      
      <div>
        <label class="block text-xs font-semibold text-epic-gold mb-1 uppercase tracking-wider">Priority</label>
        <div class="flex gap-2">
          <button (click)="newReminder.priority = 'low'" [class.bg-epic-gold]="newReminder.priority === 'low'" [class.text-epic-900]="newReminder.priority === 'low'" class="flex-1 py-2 text-xs font-bold rounded-lg border border-epic-700 text-gray-400 transition-colors">Low</button>
          <button (click)="newReminder.priority = 'medium'" [class.bg-epic-gold]="newReminder.priority === 'medium'" [class.text-epic-900]="newReminder.priority === 'medium'" class="flex-1 py-2 text-xs font-bold rounded-lg border border-epic-700 text-gray-400 transition-colors">Medium</button>
          <button (click)="newReminder.priority = 'high'" [class.bg-epic-ruby]="newReminder.priority === 'high'" [class.text-white]="newReminder.priority === 'high'" class="flex-1 py-2 text-xs font-bold rounded-lg border border-epic-700 text-gray-400 transition-colors">High</button>
        </div>
      </div>
    </div>

    <button (click)="saveReminder()" [disabled]="!newReminder.title || !newReminder.time" class="w-full py-4 mt-2 bg-gradient-to-r from-epic-gold to-yellow-400 hover:from-yellow-400 hover:to-epic-gold disabled:from-gray-700 disabled:text-gray-500 text-epic-900 rounded-xl font-bold font-serif shadow-[0_0_15px_rgba(251,191,36,0.3)] transition-all active:scale-95 text-lg cursor-pointer">
      Seal Decree
    </button>
  </div>
</div>
