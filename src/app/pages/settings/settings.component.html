<div class="animate-fade-in py-2 h-full flex flex-col">
  <div class="mb-6">
    <h1 class="text-3xl font-bold font-serif text-transparent bg-clip-text bg-gradient-to-r from-epic-gold to-yellow-200 text-white">Settings</h1>
    <p class="text-sm text-gray-400">Manage preferences and data</p>
  </div>

  <div class="flex-1 overflow-y-auto pb-4">
    
    <!-- User Goals -->
    <div class="bg-epic-800 rounded-2xl shadow-md shadow-black/40 border border-epic-700 p-4 mb-6">
      <h2 class="text-sm font-bold text-gray-200 uppercase tracking-wider mb-4 border-b border-epic-700 pb-2">Goals & Profile</h2>
      
      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Target Weight ({{ settings.units }})</label>
        <input type="number" step="0.5" [(ngModel)]="settings.targetWeight" class="w-full bg-epic-900 border border-epic-700 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-epic-gold focus:border-epic-gold outline-none text-white transition-shadow">
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Height (cm)</label>
        <input type="number" step="1" [(ngModel)]="settings.height" class="w-full bg-epic-900 border border-epic-700 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-epic-gold focus:border-epic-gold outline-none text-white transition-shadow text-gray-500">
        <p class="text-[10px] text-gray-400 mt-1 pl-1">Used for BMI calculation.</p>
      </div>

      <div class="mb-2 mt-6 border-t border-epic-700/50 pt-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Prime Focus Area</label>
        <div class="space-y-2">
          
          <label class="flex items-center p-3 rounded-xl border transition-colors cursor-pointer" [class.bg-epic-800]="settings.focusMode !== 'recovery'" [class.border-epic-700]="settings.focusMode !== 'recovery'" [class.bg-epic-900]="settings.focusMode === 'recovery'" [class.border-epic-gold]="settings.focusMode === 'recovery'">
            <input type="radio" name="focusMode" value="recovery" [(ngModel)]="settings.focusMode" class="hidden">
            <div class="w-5 h-5 rounded-full border border-gray-500 mr-3 flex items-center justify-center flex-shrink-0" [class.border-epic-gold]="settings.focusMode === 'recovery'">
              <div *ngIf="settings.focusMode === 'recovery'" class="w-3 h-3 rounded-full bg-epic-gold"></div>
            </div>
            <div>
              <div class="font-bold text-gray-200 text-sm">Pain Recovery</div>
              <div class="text-xs text-gray-400">Prioritize mobility tracking.</div>
            </div>
          </label>

          <label class="flex items-center p-3 rounded-xl border transition-colors cursor-pointer" [class.bg-epic-800]="settings.focusMode !== 'weight_loss'" [class.border-epic-700]="settings.focusMode !== 'weight_loss'" [class.bg-epic-900]="settings.focusMode === 'weight_loss'" [class.border-epic-gold]="settings.focusMode === 'weight_loss'">
            <input type="radio" name="focusMode" value="weight_loss" [(ngModel)]="settings.focusMode" class="hidden">
            <div class="w-5 h-5 rounded-full border border-gray-500 mr-3 flex items-center justify-center flex-shrink-0" [class.border-epic-gold]="settings.focusMode === 'weight_loss'">
              <div *ngIf="settings.focusMode === 'weight_loss'" class="w-3 h-3 rounded-full bg-epic-gold"></div>
            </div>
            <div>
              <div class="font-bold text-gray-200 text-sm">Weight Loss</div>
              <div class="text-xs text-gray-400">Focus on cardio/diet logs.</div>
            </div>
          </label>

          <label class="flex items-center p-3 rounded-xl border transition-colors cursor-pointer" [class.bg-epic-800]="settings.focusMode !== 'maintenance'" [class.border-epic-700]="settings.focusMode !== 'maintenance'" [class.bg-epic-900]="settings.focusMode === 'maintenance'" [class.border-epic-gold]="settings.focusMode === 'maintenance'">
            <input type="radio" name="focusMode" value="maintenance" [(ngModel)]="settings.focusMode" class="hidden">
            <div class="w-5 h-5 rounded-full border border-gray-500 mr-3 flex items-center justify-center flex-shrink-0" [class.border-epic-gold]="settings.focusMode === 'maintenance'">
              <div *ngIf="settings.focusMode === 'maintenance'" class="w-3 h-3 rounded-full bg-epic-gold"></div>
            </div>
            <div>
              <div class="font-bold text-gray-200 text-sm">Maintenance</div>
              <div class="text-xs text-gray-400">Balanced overall health.</div>
            </div>
          </label>

        </div>
      </div>

      <div class="mb-2 mt-6 border-t border-epic-700/50 pt-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Application Theme</label>
        <div class="grid grid-cols-2 gap-2">
          
          <label class="flex items-center justify-center p-3 rounded-xl border transition-colors cursor-pointer" [class.bg-epic-800]="settings.theme !== 'obsidian'" [class.border-epic-700]="settings.theme !== 'obsidian'" [class.bg-epic-900]="settings.theme === 'obsidian'" [class.border-epic-gold]="settings.theme === 'obsidian'">
            <input type="radio" name="theme" value="obsidian" [(ngModel)]="settings.theme" class="hidden">
            <div class="w-4 h-4 rounded-full bg-slate-900 border border-slate-500 mr-2 flex-shrink-0"></div>
            <div class="font-bold text-gray-200 text-sm">Obsidian Gold</div>
          </label>

          <label class="flex items-center justify-center p-3 rounded-xl border transition-colors cursor-pointer" [class.bg-epic-800]="settings.theme !== 'crimson'" [class.border-epic-700]="settings.theme !== 'crimson'" [class.bg-epic-900]="settings.theme === 'crimson'" [class.border-epic-gold]="settings.theme === 'crimson'">
            <input type="radio" name="theme" value="crimson" [(ngModel)]="settings.theme" class="hidden">
            <div class="w-4 h-4 rounded-full bg-red-950 border border-red-500 mr-2 flex-shrink-0"></div>
            <div class="font-bold text-gray-200 text-sm">Crimson Vitality</div>
          </label>

          <label class="flex items-center justify-center p-3 rounded-xl border transition-colors cursor-pointer" [class.bg-epic-800]="settings.theme !== 'ocean'" [class.border-epic-700]="settings.theme !== 'ocean'" [class.bg-epic-900]="settings.theme === 'ocean'" [class.border-epic-gold]="settings.theme === 'ocean'">
            <input type="radio" name="theme" value="ocean" [(ngModel)]="settings.theme" class="hidden">
            <div class="w-4 h-4 rounded-full bg-cyan-950 border border-cyan-500 mr-2 flex-shrink-0"></div>
            <div class="font-bold text-gray-200 text-sm">Abyssal Ocean</div>
          </label>

          <label class="flex items-center justify-center p-3 rounded-xl border transition-colors cursor-pointer" [class.bg-epic-800]="settings.theme !== 'forest'" [class.border-epic-700]="settings.theme !== 'forest'" [class.bg-epic-900]="settings.theme === 'forest'" [class.border-epic-gold]="settings.theme === 'forest'">
            <input type="radio" name="theme" value="forest" [(ngModel)]="settings.theme" class="hidden">
            <div class="w-4 h-4 rounded-full bg-emerald-950 border border-emerald-500 mr-2 flex-shrink-0"></div>
            <div class="font-bold text-gray-200 text-sm">Emerald Forest</div>
          </label>

        </div>
      </div>

    </div>

    <!-- Preferences -->
    <div class="bg-epic-800 rounded-2xl shadow-md shadow-black/40 border border-epic-700 p-4 mb-6">
      <h2 class="text-sm font-bold text-gray-200 uppercase tracking-wider mb-4 border-b border-epic-700 pb-2">Preferences</h2>
      
      <div class="mb-2">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Weight Units</label>
        
        <div class="flex mt-2 bg-epic-900/50 p-1 rounded-xl">
          <button (click)="settings.units = 'kg'" [class.bg-white]="settings.units === 'kg'" [class.dark:bg-gray-700]="settings.units === 'kg'" [class.shadow]="settings.units === 'kg'" class="flex-1 py-2 text-sm font-bold text-gray-200 rounded-lg transition-all">
            Kilograms (kg)
          </button>
          <button (click)="settings.units = 'lbs'" [class.bg-white]="settings.units === 'lbs'" [class.dark:bg-gray-700]="settings.units === 'lbs'" [class.shadow]="settings.units === 'lbs'" class="flex-1 py-2 text-sm font-bold text-gray-200 rounded-lg transition-all">
            Pounds (lbs)
          </button>
        </div>
      </div>
    </div>

    <button (click)="saveSettings()" class="w-full py-4 bg-epic-gold hover:bg-epic-gold_dim text-epic-900 rounded-xl font-bold shadow-md shadow-epic-gold/20 transition-colors active:scale-95 mb-4 flex items-center justify-center">
      <svg *ngIf="isSaving" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      {{ isSaving ? 'Saving...' : 'Save Preferences' }}
    </button>
    <div *ngIf="saveMessage" class="text-center text-sm font-medium text-green-600 dark:text-green-400 mb-6 animate-fade-in">{{ saveMessage }}</div>

    <!-- Data Management -->
    <div class="bg-epic-800 rounded-2xl shadow-md shadow-black/40 border border-orange-100 dark:border-orange-900/30 p-4 mb-6">
      <h2 class="text-sm font-bold text-orange-800 dark:text-orange-400 uppercase tracking-wider mb-4 border-b border-orange-100 dark:border-orange-900/30 pb-2">Data Management</h2>
      
      <p class="text-xs text-gray-400 mb-4">You can export your local data to a JSON file to serve as a backup, or restore from an existing backup.</p>

      <div class="flex gap-3">
        <button (click)="exportData()" class="flex-1 py-3 bg-epic-900 border border-epic-700 text-gray-200 rounded-xl font-bold transition-colors hover:bg-gray-100 dark:hover:bg-gray-800 active:scale-95 flex items-center justify-center">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          Export Data
        </button>

        <input type="file" #fileInput (change)="handleFileUpload($event)" accept=".json" class="hidden">
        
        <button (click)="triggerFileInput()" class="flex-1 py-3 bg-epic-900 border border-epic-700 text-gray-200 rounded-xl font-bold transition-colors hover:bg-gray-100 dark:hover:bg-gray-800 active:scale-95 flex items-center justify-center">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
          Import Data
        </button>
      </div>
    </div>

  </div>
</div>
